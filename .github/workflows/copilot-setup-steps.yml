name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Perl 5.40
        uses: shivammathur/setup-perl@v2
        with:
          perl-version: '5.40'

      - name: Install CPAN modules
        run: cpanm --installdeps -n .
